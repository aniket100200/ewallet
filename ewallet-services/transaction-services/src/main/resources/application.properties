## ====================================================================
## FOR API GATEWAY CONFIG
## ====================================================================
# Tell the service to register its IP, not its machine name
eureka.instance.prefer-ip-address=true

# This makes the name in Eureka clear and unique
eureka.instance.instance-id=${spring.application.name}:${random.value}

## ===================================================================
## RESILIENCE4J CIRCUIT BREAKER CONFIGURATION
## ===================================================================

# How many requests to measure before evaluating the failure rate
resilience4j.circuitbreaker.instances.userServiceCb.sliding-window-size=5

# If 50% of the last 5 requests fail, OPEN the circuit
resilience4j.circuitbreaker.instances.userServiceCb.failure-rate-threshold=50

# How long to wait in the OPEN state before trying again (Half-Open)
resilience4j.circuitbreaker.instances.userServiceCb.wait-duration-in-open-state=10s

# How many test requests to allow in the Half-Open state
resilience4j.circuitbreaker.instances.userServiceCb.permitted-number-of-calls-in-half-open-state=2



