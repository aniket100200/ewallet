services:
  # ==========================================
  # INFRASTRUCTURE SERVICES
  # ==========================================
  mysql-db:
    image: mysql:latest
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Kolkata
    ports:
      - "3306:3306"
    networks:
      - ewallet-network

  my-local-redis:
    image: redis
    container_name: my-local-redis
    ports:
      - "6379:6379"
    networks:
      - ewallet-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - ewallet-network

  # ==========================================
  # DISCOVERY & CONFIG SERVERS
  # ==========================================
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - TZ=Asia/Kolkata
      - JAVA_TOOL_OPTIONS="-Duser.timezone=Asia/Kolkata"
    networks:
      - ewallet-network

  # ---> ADDED CONFIG SERVER <---
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - TZ=Asia/Kolkata
      - JAVA_TOOL_OPTIONS="-Duser.timezone=Asia/Kolkata"
    depends_on:
      - eureka-server
    networks:
      - ewallet-network

  # ==========================================
  # MICROSERVICES (Now entirely Config-Driven)
  # ==========================================
  user-service:
    build: ./user-services
    container_name: user-service
    restart: on-failure
    ports:
      - "8076:8076"
    environment:
      - TZ=Asia/Kolkata
      - JAVA_TOOL_OPTIONS="-Duser.timezone=Asia/Kolkata"
    depends_on:
      - mysql-db
      - eureka-server
      - config-server # Must wait for config to load
      - kafka
      - my-local-redis
    networks:
      - ewallet-network

  wallet-service:
    build: ./wallet-services
    container_name: wallet-service
    restart: on-failure
    ports:
      - "6000:6000"
    environment:
      - TZ=Asia/Kolkata
      - JAVA_TOOL_OPTIONS="-Duser.timezone=Asia/Kolkata"
    depends_on:
      - mysql-db
      - eureka-server
      - config-server
      - kafka
      - my-local-redis
    networks:
      - ewallet-network

  transaction-service:
    build: ./transaction-services
    container_name: transaction-service
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      - TZ=Asia/Kolkata
      - JAVA_TOOL_OPTIONS="-Duser.timezone=Asia/Kolkata"
    depends_on:
      - mysql-db
      - eureka-server
      - config-server
      - kafka
      - my-local-redis
    networks:
      - ewallet-network

  notification-service:
    build: ./notifications-service
    container_name: notification-service
    restart: on-failure
    ports:
      - "9002:9002"
    environment:
      - TZ=Asia/Kolkata
      - JAVA_TOOL_OPTIONS="-Duser.timezone=Asia/Kolkata"
    depends_on:
      - mysql-db
      - eureka-server
      - config-server
      - kafka
      - my-local-redis
    networks:
      - ewallet-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Kolkata
      - JAVA_TOOL_OPTIONS="-Duser.timezone=Asia/Kolkata"
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - config-server
    networks:
      - ewallet-network

networks:
  ewallet-network:
    driver: bridge