spring.datasource.url=jdbc:mysql://localhost:3306/emailDb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
server.port=9002
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
logging.level.org.springframework=debug
spring.kafka.consumer.auto-offset-reset= earliest

# Force the dialect so Hibernate doesn't have to guess
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Useful for debugging
spring.jpa.show-sql=true

# Give the service a unique name for Eureka
spring.application.name=NOTIFICATION-SERVICE

# Point it to your Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===================================================================
# Redis CONFIGURATION
# ===================================================================
spring.cache.type=redis
spring.redis.host=${SPRING_REDIS_HOST:my-local-redis}
spring.redis.port=${SPRING_REDIS_PORT:6379}
# ===================================================================
# KAFKA CONFIGURATION
# ===================================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=my-group
# ===================================================================
# Mail Configuration
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=khangaraniket365@gmail.com
spring.mail.password=xeeqhnamuvoycdvl
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ====================================================================
# FOR API GATEWAY CONFIG
# ====================================================================
# Tell the service to register its IP, not its machine name
eureka.instance.prefer-ip-address=true

# This makes the name in Eureka clear and unique
eureka.instance.instance-id=${spring.application.name}:${random.value}