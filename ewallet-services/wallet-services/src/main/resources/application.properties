spring.datasource.url=jdbc:mysql://localhost:3306/walletDb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
server.port=6000
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
logging.level.org.springframework=debug
spring.kafka.consumer.auto-offset-reset= earliest

# Force the dialect so Hibernate doesn't have to guess
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Useful for debugging
spring.jpa.show-sql=true

# Give the service a unique name for Eureka
spring.application.name=WALLET-SERVICE

# Point it to your Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/